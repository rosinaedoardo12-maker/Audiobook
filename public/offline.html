<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audiobook Studio Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #040b14 0%, #08131f 46%, #0d1c2d 100%);
        color: #eff6ff;
        font-family: "Segoe UI", sans-serif;
      }

      main {
        width: min(92vw, 560px);
        padding: 32px;
        border-radius: 28px;
        background: rgba(10, 19, 33, 0.82);
        border: 1px solid rgba(157, 197, 255, 0.15);
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 32px;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: #b9c9d9;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Sei offline</h1>
      <p>L'interfaccia e disponibile, ma per leggere le voci e generare nuovi audiolibri serve una connessione internet.</p>
    </main>
  </body>
</html>
